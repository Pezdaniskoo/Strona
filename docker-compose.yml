version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - todo_network

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: ["php", "artisan", "queue:work", "--tries=3", "--sleep=1"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      app:
        condition: service_started
    networks:
      - todo_network

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo_scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - todo_network

  nginx:
    image: nginx:1.27-alpine
    container_name: todo_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - todo_network

  mysql:
    image: mysql:8.0
    container_name: todo_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: todo_list
      MYSQL_USER: todo
      MYSQL_PASSWORD: todo
      MYSQL_ROOT_PASSWORD: root
      TZ: UTC
    ports:
      - "33066:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - todo_network

  redis:
    image: redis:7-alpine
    container_name: todo_redis
    restart: unless-stopped
    ports:
      - "63790:6379"
    networks:
      - todo_network

  mailpit:
    image: axllent/mailpit:latest
    container_name: todo_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - todo_network

volumes:
  mysql_data:

networks:
  todo_network:
    driver: bridge
